name: Run Supabase Migration

on:
  push:
    paths:
      - 'scripts/run_migration_direct.js'
      - '.github/workflows/run-migration.yml'
  workflow_dispatch:

jobs:
  run-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install pg

      - name: Execute Migration Script
        run: |
          node scripts/run_migration_direct.js > migration_output.txt 2>&1 || true
          cat migration_output.txt

      - name: Commit and Push Output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add migration_output.txt
          git commit -m "chore: save migration output [skip ci]" || true
          git push origin main
