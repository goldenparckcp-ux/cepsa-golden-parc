name: Run Supabase Migration

on:
  workflow_dispatch:

jobs:
  run-migration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install pg

      - name: Execute Migration Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node devtools/scripts/run_migration_direct.js > migration_output.txt 2>&1 || true
          cat migration_output.txt
          echo "### Migration Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat migration_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Check if script output contains success
          if grep -q "Migration query executed!" migration_output.txt; then
            echo "Success"
          else
            exit 1
          fi
